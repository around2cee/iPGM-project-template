name: Report to iPGM Portfolio

on: [push]

jobs:
  trigger-sync:
    name: Notify iPGM Hub of Update
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch repo-updated event to iPGM hub
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORG_PORTFOLIO_TOKEN }}
          repository: Chas-Test-Org/iPGM-hub
          event-type: repo-updated
