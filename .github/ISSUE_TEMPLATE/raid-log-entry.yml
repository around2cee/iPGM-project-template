name: RAID Log Entry
description: Log a Risk, Assumption, Issue, or Dependency (iPGM 5.1)
labels: ["raid"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Entry Type
      options: [Risk, Assumption, Issue, Dependency]
    validations:
      required: true
  - type: input
    id: title
    attributes:
      label: Summary
      placeholder: One-line description of the RAID item
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Full Description
      placeholder: Provide context, background, and current state
  - type: dropdown
    id: severity
    attributes:
      label: Severity / Likelihood
      options: [High, Medium, Low]
    validations:
      required: true
  - type: input
    id: owner
    attributes:
      label: Owner
      placeholder: Name of the person responsible for resolving/monitoring this item
  - type: input
    id: due_date
    attributes:
      label: Target Resolution Date
      placeholder: "YYYY-MM-DD"
  - type: textarea
    id: mitigation
    attributes:
      label: Mitigation / Action Plan
      placeholder: What are we doing about this?
  - type: checkboxes
    id: escalate
    attributes:
      label: Escalate to Portfolio Board?
      options:
        - label: Yes — apply the `portfolio-report` label to surface this on the iPGM board
